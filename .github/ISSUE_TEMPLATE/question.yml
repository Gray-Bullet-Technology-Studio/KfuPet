name: Question
description: 提出关于项目的问题或建议
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        ---
        感谢你对 KfuPet 的关注！请清晰描述你的问题。

  - type: textarea
    validations:
      required: true
    attributes:
      label: "问题描述"
      description: "清晰描述你的问题"
      placeholder: "我想了解关于...的问题"

  - type: textarea
    attributes:
      label: "背景信息"
      description: "提供相关的背景信息，帮助我们理解你的问题"
      placeholder: "我正在尝试...，遇到了...问题"

  - type: dropdown
    attributes:
      label: "问题类型"
      options:
        - "使用问题"
        - "开发问题"
        - "角色制作问题"
        - "技术架构问题"
        - "其他"
      default: 0

  - type: textarea
    attributes:
      label: "附加信息"
      description: "其他相关信息"
      placeholder: "其他相关信息..."